<!DOCTYPE html>
<html>
<head>
    <title>Spam Classifier</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #667eea, #764ba2);
            text-align: center;
            color: white;
            padding-top: 80px;
        }

        .container {
            background: white;
            color: black;
            padding: 30px;
            border-radius: 15px;
            width: 420px;
            margin: auto;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.3);
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(20px);}
            to {opacity: 1; transform: translateY(0);}
        }

        input {
            width: 85%;
            padding: 12px;
            margin: 10px;
            border-radius: 8px;
            border: 1px solid gray;
        }

        button {
            padding: 10px 18px;
            margin: 5px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .check-btn {
            background: #667eea;
            color: white;
        }

        .clear-btn {
            background: #e53e3e;
            color: white;
        }

        button:hover {
            opacity: 0.8;
        }

        .result {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
        }

        .spam {
            color: red;
        }

        .not-spam {
            color: green;
        }

        .history {
            margin-top: 20px;
            text-align: left;
            font-size: 14px;
            max-height: 120px;
            overflow-y: auto;
        }

        .history-item {
            background: #f1f1f1;
            padding: 8px;
            margin: 5px 0;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>📩 Spam Classifier</h2>

    <form method="POST">
        <input type="text" name="message" placeholder="Enter your message..." required>
        <br>
        <button class="check-btn" type="submit">Check</button>
        <button class="clear-btn" type="button" onclick="clearInput()">Clear</button>
    </form>

    {% if result %}
        <div class="result {{ 'spam' if 'Spam' in result else 'not-spam' }}">
            {{ result }}
        </div>
    {% endif %}

    {% if history %}
        <div class="history">
            <h4>🕒 History</h4>
            {% for item in history %}
                <div class="history-item">{{ item }}</div>
            {% endfor %}
        </div>
    {% endif %}
</div>

<script>
function clearInput() {
    document.querySelector('input').value = "";
}
</script>

</body>
</html>
